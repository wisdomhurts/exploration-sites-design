  <script>
    // Mega menu tab switching
    document.querySelectorAll('.mega-menu-tab').forEach(function(tab) {
      tab.addEventListener('mouseenter', function() {
        var tabId = this.getAttribute('data-tab');
        document.querySelectorAll('.mega-menu-tab').forEach(function(t) { t.classList.remove('is-active'); });
        document.querySelectorAll('.mega-menu-tab-panel').forEach(function(p) { p.classList.remove('is-active'); });
        this.classList.add('is-active');
        var panel = document.getElementById('panel-' + tabId);
        if (panel) panel.classList.add('is-active');
      });
    });

    // Mega menu aria-expanded toggle
    var trigger = document.querySelector('.mega-menu-trigger');
    var wrapper = document.querySelector('.mega-menu-wrapper');
    if (trigger && wrapper) {
      wrapper.addEventListener('mouseenter', function() { trigger.setAttribute('aria-expanded', 'true'); });
      wrapper.addEventListener('mouseleave', function() { trigger.setAttribute('aria-expanded', 'false'); });
      trigger.addEventListener('focus', function() { trigger.setAttribute('aria-expanded', 'true'); });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && trigger.getAttribute('aria-expanded') === 'true') {
          trigger.setAttribute('aria-expanded', 'false');
          trigger.focus();
        }
      });
    }

  </script>
